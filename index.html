<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>


    
    <nav>
        <a href="index.html" id="logoLink"><img id="logo" src="Logo/longLogo.png"></a>
        <ul>
            <li><a href="#">Search</a></li>
            <li><a href="#">Sets</a></li>
            <li><a href="#">Collection</a></li>
        </ul>
    </nav>

    <div id="heroWrapper">
        <div id="overlay"></div>
    </div>

    <div class="mainTextContainer">
        <div class="mainText">
            <h1 id="mainText"><span class="topText">CHECK YOUR</span>
                </span> <br><span class="middleText">POKEMON CARD VALUE</span>
            </h1>
        </div>

        <div class="blurb">
            <p><span class="lineOne">Track real-time Pokémon card prices from <span id="tcg">TCGPlayer</span> and <span id="ebay">eBay</span>.</span>
                <span class="lineTwo">Search 15,000+ cards, browse full sets, and manage your</span>
                <span class="lineThree">personal collection — all in one place.</span>
            </p>
        </div>

        <div class="searchBar">
            <form id="form">
                <input type="search" id="query" name="q" placeholder="Enter Card Name...">
            </form>
        </div>

        

        <div class="buttons">
            <button class="btnTwo" type="button">Personal Collection</button>
            <button class="btnThree" type="button">Price Guide</button>
        </div>

        <div class="tiny">
            <span class="sml">(DID I MENTION ITS FREE?!)</span>
        </div>

    </div>

    <div id="secondCaro">
        <div id="hotCardsText">
            <h1>TOP HOT CARDS</h1>
        </div>
    </div>
<script src="index.js"></script>
</body>
</html>
